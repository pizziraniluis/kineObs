version: '3.8'

services:
  obsidian:
    image: ghcr.io/sytone/obsidian-remote:latest
    container_name: kineobs-obsidian
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./obsidian-data/vaults:/vaults
      - ./obsidian-data/config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - DOCKER_MODS=linuxserver/mods:universal-git
      - CUSTOM_PORT=8080
      - CUSTOM_HTTPS_PORT=8443
    shm_size: 1gb

  # Serviço temporário para ajudar a construir o projeto
  opencode:
    image: node:22-bookworm
    container_name: kineobs-opencode
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ./obsidian-data:/obsidian-data
    stdin_open: true
    tty: true
    command: bash
    restart: unless-stopped
